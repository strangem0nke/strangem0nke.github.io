<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" >
        <meta name="description" content="String Test" >
        <meta name="keywords" content="HTML,VueJS,JavaScript" >
        <meta name="author" content="strangem0nke" >
        <title>String Test</title>

        <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
        rel="stylesheet" 
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" 
        crossorigin="anonymous">
    </head>
    <body class="bg-primary-subtle">
        <div class="container bg-secondary-subtle text-center p-3">
            <h1>Input Testing!</h1>
        </div>
        <div id="app" class="container bg-secondary-subtle text-center p-2 my-1">
            <p>Please enter your name:
            <input type="text" v-model="strName"></p>
            <div v-if="inputFilter == 'strangemonke' || inputFilter == 'strangem0nke' || inputFilter == 'monke'">
                <p>{{strName}}? That's an awesome name!</p>
                <img src="media/monke.gif" alt="monke">
            </div>
            <div v-else>
                <div v-if="inputFilter == ''">
                    <p>Hi!</p>
                </div>
                <div v-else-if="inputFilter!=''">
                    <p>Hello, {{strName}}, nice to meet you. That's not my name though.</p>
                </div>
            </div>
        </div>

        <script src="https://unpkg.com/vue@3"></script>
        <script>
            Vue.createApp({
                data() { 
                    return {
                        strName:''
                    }  
                },
                //Filter for case insensitity
                computed: {
                    inputFilter: function() {
                        return this.strName.toLowerCase()
                    }
                }
                
            }).mount('#app');
        </script>
        <footer>
            <div class="container p-4 bg-secondary-subtle">
                <div class="row">
                    <div class="col-md-8">
                        <p><a href="index.html">Back to index</a></p>
                    </div>
                    <div class="col-md-4 text-end">
                        <p>Made by <a href="https://github.com/strangem0nke">strangemonke</a></p>
                    </div>
                </div>
            </div>
        </footer>
    </body>
</html>
