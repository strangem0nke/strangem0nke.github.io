<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" >
        <meta name="description" content="Registration Form" >
        <meta name="keywords" content="HTML,VueJS,JavaScript" >
        <meta name="author" content="strangem0nke" >
        <title>Registration Form</title>

        <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
        rel="stylesheet" 
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" 
        crossorigin="anonymous">
    </head>
    <body class="bg-primary-subtle">
        <header>
            <div class="container bg-secondary-subtle text-center p-3 my-2">
                <h1>Registration App: Cloud Testing</h1>
            </div>
        </header>
        <main id="app">
            <div class="container bg-secondary-subtle">
                <fieldset class="container p-3 my-3">
                    <legend><h2>Login Information</h2></legend>
                    <p>
                        <label for="strUser">Please enter username:</label>
                        <input type="text" v-model="userData.strUser">
                    </p>
                    <p>
                        <label for="strPass1">Please enter password:  </label>
                        <input type="text" v-model="userData.strPass1">
                    </p>
                    <p>
                        <label for="strPass2">Please re-enter password:  </label>
                        <input type="text" v-model="userData.strPass2">
                    </p>
                    <div v-if="userData.strPass1 !== userData.strPass2 && userData.strPass1 !='' && userData.strPass2 != ''">
                        <p>Passwords do not match!</p>
                    </div>
                </fieldset>
                <fieldset class="container row">
                    <legend><h2>Phone Information</h2></legend>
                    <div class="col-6">
                        <div class="row p-2 my-2">
                            <h3>Operating System</h3>
                            <div class="col-3">
                                <label for="Android">Android</label>
                                <input type="radio" v-model="userData.os" value="Android" name="userData.os" checked>
                            </div>
                            <div class="col-3">
                                <label for="IOS">IOS</label>
                                <input type="radio" v-model="userData.os" value="IOS" name="userData.os">
                            </div>
                            <div class="col-3">
                                <label for="Windows">Windows</label>
                                <input type="radio" v-model="userData.os" value="Windows" name="userData.os">
                            </div>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="row p-2 my-2">
                            <h3>Model:</h3>
                            <div class="col-4">
                                <select id="model" name="userData.model" v-model="userData.model">
                                    <option v-for="m in showMatches">{{m.model}}</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </fieldset>
                <div>
                    <h2>Summary:</h2>
                    <p>Username: {{userData.strUser}}</p>
                    <p>Phone OS: {{userData.os}}</p>
                    <p>Phone Model: {{userData.model}}</p>
                </div>
            </div>
        </main>
        <script src="https://unpkg.com/vue@3"></script>
        <script src="js/registration.js"></script>
        <footer>
            <div class="container p-4 bg-secondary-subtle">
                <div class="row">
                    <div class="col-md-8">
                        <p><a href="index.html">Back to index</a></p>
                    </div>
                    <div class="col-md-4 text-end">
                        <p>Made by <a href="https://github.com/strangem0nke">strangemonke</a></p>
                    </div>
                </div>
            </div>
        </footer>
    </body>
</html>
