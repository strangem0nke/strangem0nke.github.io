
<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="utf-8" >
        <meta name="description" content="Unit Lookup Application" >
        <meta name="keywords" content="HTML,VueJS,JavaScript" >
        <meta name="author" content="strangem0nke" >
        <title>Guessing Game</title>

        <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
        rel="stylesheet" 
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" 
        crossorigin="anonymous">
    </head>

    <body class="bg-primary-subtle">
        <header class="container bg-secondary-subtle">
            <div class="p-3 my-2 text-center">
                <h1>Number Guessing Game</h1>
            </div>
        </header>

        <main class="container bg-secondary-subtle" id="app">
            <div class="col-6 p-3 my-2">
                <label for="numInput">Enter your guess from 1 to 100:</label>
                <input type="number" min="1" max="100" v-model="inputNumber" placeholder="1">
            </div>
            <div class="row p-2">
                <div class="col-3">
                    <button type="button" v-on:click="guessNum()">Check Guess</button>
                </div>
                <div class="col-3">
                    <button type="button" v-on:click="givenUp()">Give Up</button>
                </div>
                <div class="col-3">
                    <button type="button" v-on:click="restart()">Restart</button>
                </div>
            </div>
            <div class="row text-center">
                <p>{{msg}}</p>
            </div>
        </main>

        <footer>
            <div class="container p-4 bg-secondary-subtle my-2">
                <div class="row">
                    <div class="col-md-8">
                        <p><a href="index.html">Back to index</a></p>
                    </div>
                    <div class="col-md-4 text-end">
                        <p>Made by <a href="https://github.com/strangem0nke">strangemonke</a></p>
                    </div>
                </div>
            </div>
        </footer>
        <script src="https://unpkg.com/vue@3"></script>
        <script src="js/gameapp.js"></script>
    </body>
</html>
